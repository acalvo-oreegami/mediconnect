<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <h1>Login to MediConnect</h1>
            <form>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Login</button>
            </form>
        </div>

        <!-- Doctor Dashboard -->
        <div id="doctor-dashboard" class="screen">
            <h1>Welcome, Doctor!</h1>
            <nav>
                <ul>
                    <li><a href="#">Patient List</a></li>
                    <li><a href="#">Schedule</a></li>
                    <li><a href="#">Messages</a></li>
                </ul>
            </nav>
            <div class="appointments">
                <h2>Upcoming Appointments</h2>
                <ul>
                    <li>Alice Smith - 10:00 AM</li>
                    <li>Bob Johnson - 11:30 AM</li>
                </ul>
            </div>
        </div>

        <!-- Patient Profile -->
        <div id="patient-profile" class="screen">
            <h1>Patient Profile</h1>
            <h2>John Doe</h2>
            <p>Age: 30</p>
            <p>Medical History:</p>
            <ul>
                <li>Allergy: Penicillin</li>
                <li>Condition: Hypertension</li>
            </ul>
            <button>Edit Profile</button>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
